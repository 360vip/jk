name: TVBox Config Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gitpython beautifulsoup4 html5lib chardet
        
    - name: 创建必要目录
      run: |
        mkdir -p data
        mkdir -p proxy
        mkdir -p tvbox/jar
        mkdir -p xl
        echo "目录创建完成"
        
    - name: 从私有仓库克隆并复制文件
      run: |
        # 克隆私有仓库
        git clone https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/360vip/my.git /tmp/private-repo
        
        # 复制 Python 脚本文件
        if [ -f "/tmp/private-repo/toolspy/tvbox_tools.py" ]; then
          cp /tmp/private-repo/toolspy/tvbox_tools.py .
          echo "tvbox_tools.py 已复制"
        else
          echo "警告: tvbox_tools.py 不存在"
        fi
        
        if [ -f "/tmp/private-repo/toolspy/mybox.py" ]; then
          cp /tmp/private-repo/toolspy/mybox.py .
          echo "mybox.py 已复制"
        else
          echo "警告: mybox.py 不存在"
        fi
        
        if [ -f "/tmp/private-repo/proxy/dl.py" ]; then
          cp /tmp/private-repo/proxy/dl.py .
          echo "dl.py 已复制"
        else
          echo "警告: dl.py 不存在"
        fi
        
        # 复制数据文件
        if [ -f "/tmp/private-repo/data/url.txt" ]; then
          cp /tmp/private-repo/data/url.txt ./data/
          echo "url.txt 已复制到 data 目录"
        else
          echo "警告: data/url.txt 不存在"
        fi
        
        if [ -f "/tmp/private-repo/proxy/url.txt" ]; then
          cp /tmp/private-repo/proxy/url.txt ./proxy/
          echo "url.txt 已复制到 proxy 目录"
        else
          echo "警告: proxy/url.txt 不存在"
        fi
        
        # 清理临时目录
        rm -rf /tmp/private-repo
        echo "私有仓库文件复制完成"
        
    - name: 运行 tvbox_tools.py
      run: |
        python tvbox_tools.py
        
    - name: 运行 dl.py (proxy updater)
      run: |
        python dl.py
        
    - name: 运行 mybox.py
      run: |
        python mybox.py
        
    - name: 推送 mybox 目录到私有仓库
      run: |
        if [ ! -d "mybox" ]; then
          echo "警告: mybox 目录不存在，跳过推送"
          exit 0
        fi
        
        echo "开始推送 mybox 目录到私有仓库..."
        
        # 克隆私有仓库
        git clone https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/360vip/my.git /tmp/push-repo
        
        # 确保目标目录存在
        mkdir -p /tmp/push-repo/mybox
        
        # 复制 mybox 目录内容
        cp -r mybox/* /tmp/push-repo/mybox/ 2>/dev/null || echo "mybox 目录为空"
        
        cd /tmp/push-repo
        
        # 配置 git 用户信息
        git config user.name "github-actions"
        git config user.email "github-actions@users.noreply.github.com"
        
        # 添加文件
        git add mybox/
        
        # 检查变更并提交
        if git diff --cached --quiet; then
          echo "mybox 目录没有变更需要提交"
        else
          git commit -m "自动更新 mybox 目录 - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "mybox 目录已成功推送到私有仓库"
        fi
        
        cd /
        rm -rf /tmp/push-repo
        
    - name: 推送 xl 目录到私有仓库
      run: |
        if [ ! -d "xl" ]; then
          echo "警告: xl 目录不存在，跳过推送"
          exit 0
        fi
        
        echo "开始推送xl 目录到私有仓库..."
        
        # 克隆私有仓库
        git clone https://${{ secrets.PRIVATE_REPO_TOKEN }}@github.com/360vip/my.git /tmp/push-repo-jk
        
        # 确保目标目录存在
        mkdir -p /tmp/push-repo-jk/xl
        
        # 复制 jk 目录内容
        cp -r xl/* /tmp/push-repo-jk/xl/ 2>/dev/null || echo "xl 目录为空"
        
        cd /tmp/push-repo-xl
        
        # 配置 git 用户信息
        git config user.name "github-actions"
        git config user.email "github-actions@users.noreply.github.com"
        
        # 添加文件
        git add xl/
        
        # 检查变更并提交
        if git diff --cached --quiet; then
          echo "xl 目录没有变更需要提交"
        else
          git commit -m "自动更新 jk 目录 - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "xl 目录已成功推送到私有仓库"
        fi
        
        cd /
        rm -rf /tmp/push-repo-xl
        
    - name: 本地推送 tvbox/jar 目录
      run: |
        if [ ! -d "tvbox/jar" ]; then
          echo "警告: tvbox/jar 目录不存在，跳过推送"
          exit 0
        fi
        
        # 配置 git
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 只添加 tvbox/jar 目录
        git add tvbox/jar/
        
        # 检查是否有变更
        if git diff --cached --quiet; then
          echo "tvbox/jar 目录没有变更需要提交"
        else
          git commit -m "更新 tvbox/jar 目录 - $(date '+%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "tvbox/jar 目录已成功推送到本地仓库"
        fi