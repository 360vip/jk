name: TVBox Config Update

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    paths:
      - 'data/url.txt'

jobs:
  update:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests gitpython beautifulsoup4 html5lib 
        pip install chardet requests
        
    - name: Run TVBox Config Updater
      run: |
        python tvbox_tools.py

    - name: Run proxy Updater
      run: |
        python proxy/dl.py

    - name: Run mybox Updater
      run: |
        python mybox.py
           
    - name: Commit and Push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "Update TVBox configs - $(date)" || exit 0
        git push